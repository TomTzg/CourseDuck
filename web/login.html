<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 登录</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <section class="login-hero panel">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">课程推荐原型机</span></h1>
          </div>
        </div>
        <div class="hero-copy">
          <img class="hero-center-logo" src="./assets/logo.png" alt="选课鸭 Logo" />
          <h2>Welcome to<br />选课鸭</h2>
          <p class="hint">校园课程推荐平台登录入口</p>
        </div>
        <div class="hero-meta">
          <span class="chip">仅原型：接口已预留</span>
        </div>
      </section>

      <section class="login-form-wrap panel">
        <div class="login-form-inner">
          <div class="login-head">
            <h2>登录</h2>
            <a class="login-home" href="./school.html" title="跳过登录（原型）">首页</a>
          </div>
          <p class="hint">
            仅支持校园账号登录，接口已预留：
            <span style="font-family:var(--mono)">POST /api/auth/campus-email/login</span>
          </p>

          <form id="loginForm" class="login-form">
            <div class="field">
              <label for="studentId">学号</label>
              <div class="row login-email-row">
                <input class="input" id="studentId" name="studentId" type="text" placeholder="请输入学号" autocomplete="username" required />
                <span class="chip">@link.edu.cn</span>
              </div>
            </div>
            <div class="field">
              <label for="code">验证码</label>
              <input class="input" id="code" name="code" type="text" placeholder="请输入验证码" inputmode="numeric" minlength="4" maxlength="8" required />
            </div>

            <div class="row login-actions">
              <div class="row">
                <button class="btn" id="sendCodeBtn" type="button">发送验证码</button>
                <span class="chip" id="sendHint">未发送</span>
              </div>
              <a href="#" class="login-forgot">忘记密码</a>
            </div>

            <button class="btn primary login-submit" id="loginBtn" type="submit">登 录</button>

            <div class="row policy-links login-policy">
              <span>登录即表示同意</span>
              <a href="#" id="agreementBtn">用户协议</a>
              <a href="#" id="privacyBtn">隐私政策</a>
            </div>
          </form>
        </div>
      </section>
    </div>

    <div class="footer">CourseDuck Prototype · UI/接口占位可直接对接后端</div>
    <div class="modal-overlay" id="policyModalOverlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="policyModalTitle">
        <div class="modal-header">
          <h3 class="modal-title" id="policyModalTitle">协议标题</h3>
          <button class="btn" type="button" id="policyModalCloseTop">关闭</button>
        </div>
        <div class="modal-body" id="policyModalBody">
          协议内容占位。
        </div>
        <div class="modal-footer">
          <button class="btn primary" type="button" id="policyModalCloseBottom">我知道了</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { loginWithCampusEmail } from "./assets/api.js";
      import { $, toast, writeSession } from "./assets/ui.js";

      const form = $("#loginForm");
      const studentIdEl = $("#studentId");
      const codeEl = $("#code");
      const sendBtn = $("#sendCodeBtn");
      const sendHint = $("#sendHint");
      const loginBtn = $("#loginBtn");
      const agreementBtn = $("#agreementBtn");
      const privacyBtn = $("#privacyBtn");
      const policyModalOverlay = $("#policyModalOverlay");
      const policyModalTitle = $("#policyModalTitle");
      const policyModalBody = $("#policyModalBody");
      const policyModalCloseTop = $("#policyModalCloseTop");
      const policyModalCloseBottom = $("#policyModalCloseBottom");

      function openPolicyModal(type) {
        if (type === "agreement") {
          policyModalTitle.textContent = "用户协议";
          policyModalBody.textContent = "用户协议内容预留中：后续可接入完整协议文本或 markdown 渲染。";
        } else {
          policyModalTitle.textContent = "隐私政策";
          policyModalBody.textContent = "隐私政策内容预留中：后续可接入完整隐私条款与数据说明。";
        }
        policyModalOverlay.classList.add("show");
        policyModalOverlay.setAttribute("aria-hidden", "false");
      }
      function closePolicyModal() {
        policyModalOverlay.classList.remove("show");
        policyModalOverlay.setAttribute("aria-hidden", "true");
      }

      sendBtn.addEventListener("click", () => {
        const studentId = (studentIdEl.value || "").trim();
        if (!studentId) {
          toast({ title: "请先填写学号", message: "示例：12345678" });
          return;
        }
        sendHint.textContent = "已发送（原型占位）";
        toast({
          title: "验证码已发送（占位）",
          message: "当前原型不实际发送邮件。后端接入后可实现 /api/auth/campus-email/send-code。",
        });
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const studentId = (studentIdEl.value || "").trim();
        const email = `${studentId}@link.edu.cn`;
        const code = (codeEl.value || "").trim();
        if (!studentId || !code) return;

        loginBtn.disabled = true;
        loginBtn.textContent = "登录中…";
        try {
          const res = await loginWithCampusEmail({ email, code });
          writeSession(res);
          toast({ title: "登录成功", message: `欢迎：${res.user?.email || email}` });
          setTimeout(() => (window.location.href = "./school.html"), 450);
        } catch (err) {
          toast({ title: "登录失败", message: String(err?.message || err) });
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "登录";
        }
      });

      agreementBtn.addEventListener("click", (e) => {
        e.preventDefault();
        openPolicyModal("agreement");
      });
      privacyBtn.addEventListener("click", (e) => {
        e.preventDefault();
        openPolicyModal("privacy");
      });
      policyModalCloseTop.addEventListener("click", closePolicyModal);
      policyModalCloseBottom.addEventListener("click", closePolicyModal);
      policyModalOverlay.addEventListener("click", (e) => {
        if (e.target === policyModalOverlay) closePolicyModal();
      });
    </script>
  </body>
</html>
