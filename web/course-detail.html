<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 课程详情</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">课程详情</span></h1>
          </div>
        </div>
        <div class="nav">
          <button class="btn" id="backBtn" type="button">返回课程推荐页</button>
        </div>
      </header>

      <div class="grid">
        <section class="panel">
          <p class="hint" id="courseSource">来源：Student Information System.</p>
          <div class="field field-course-code">
            <label>课程代码</label>
            <div class="chip course-code-chip" id="courseCodeVal">-</div>
          </div>
          <div class="field">
            <label>课程名称</label>
            <div class="course-name-val" id="courseNameVal">-</div>
          </div>
          <div class="item">
            <div class="t"><h3>课程大纲</h3></div>
            <div class="meta" id="courseOutlineVal">-</div>
          </div>
        </section>
      </div>
    </div>

    <script src="./assets/course-catalog.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = decodeURIComponent(params.get("code") || "").trim();
      let legacy = {};
      try {
        legacy = JSON.parse(localStorage.getItem("courseduck.courseDetails") || "{}");
      } catch {}

      const catalog = window.COURSE_CATALOG || {};
      const fromCatalog = code ? catalog[code] : null;
      const fromLegacy = code && legacy[code] ? legacy[code] : null;

      const name =
        (fromCatalog && fromCatalog.name) ||
        (fromLegacy && fromLegacy.name) ||
        "";
      const outline =
        (fromCatalog && fromCatalog.outline) ||
        (fromLegacy && fromLegacy.outline) ||
        "暂无该课程大纲";

      document.getElementById("courseCodeVal").textContent = code || "—";
      document.getElementById("courseNameVal").textContent = name || "—";
      document.getElementById("courseOutlineVal").textContent = outline;

      document.getElementById("backBtn").addEventListener("click", () => {
        if (history.length > 1) history.back();
        else window.location.href = "./recommend.html";
      });
    </script>
  </body>
</html>
