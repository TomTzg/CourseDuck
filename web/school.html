<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 选择学院</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">步骤 1/3：选择学院</span></h1>
          </div>
        </div>
        <div class="nav">
          <span class="chip" id="userChip">未登录</span>
          <a class="btn" href="./login.html">退出/切换账号</a>
        </div>
      </header>

      <section class="panel centered">
        <h2>请选择所在学院</h2>
        <p class="hint" id="scopeHint" style="margin-bottom: 12px">
          <strong>说明：</strong>现版本仅支持 <strong>SME</strong> 课程推荐与专业路径；其他学院（SSE、SDS、SAI、HSS、MUS、MED）将在后续版本接入。当前无论选择哪所学院，都会进入 SME 对应的专业选择流程供体验。
        </p>

        <form id="schoolForm" action="./info.html" method="get">
          <div class="field">
            <label for="schoolId">学院</label>
            <select id="schoolId" name="schoolId" required>
              <option value="">请选择学院</option>
              <option value="SME">SME</option>
              <option value="SSE">SSE</option>
              <option value="SDS">SDS</option>
              <option value="SAI">SAI</option>
              <option value="HSS">HSS</option>
              <option value="MUS">MUS</option>
              <option value="MED">MED</option>
            </select>
          </div>
          <div class="row" style="margin-top: 12px; justify-content: flex-end">
            <button class="btn primary" type="submit" id="confirmSchoolBtn">确认并选择专业</button>
          </div>
        </form>
      </section>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      function readSession() {
        try {
          const raw = sessionStorage.getItem("courseduck.session");
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }
      function readProfile() {
        try {
          return JSON.parse(localStorage.getItem("courseduck.profile") || "{}");
        } catch {
          return {};
        }
      }
      function writeProfile(v) {
        localStorage.setItem("courseduck.profile", JSON.stringify(v));
      }
      function toast(msg) {
        window.alert(msg);
      }

      const SCHOOL_IDS = ["SME", "SSE", "SDS", "SAI", "HSS", "MUS", "MED"];
      const session = readSession();
      const userChip = $("#userChip");
      if (userChip) {
        userChip.textContent = session?.user?.email ? `已登录：${session.user.email}` : "未登录";
      }

      const schoolForm = $("#schoolForm");
      const schoolSel = $("#schoolId");
      const profile = readProfile();

      if (profile.schoolId && SCHOOL_IDS.includes(profile.schoolId)) {
        schoolSel.value = profile.schoolId;
      }

      schoolForm.addEventListener("submit", (e) => {
        const id = (schoolSel.value || "").trim();
        if (!id) {
          e.preventDefault();
          toast("请先选择学院，选择后才能进入专业选择页。");
          return;
        }
        writeProfile({ ...readProfile(), schoolId: id });
        /* 与 info.html → career.html 相同：不 preventDefault，由浏览器 GET 提交到 action */
      });
    </script>
  </body>
</html>
