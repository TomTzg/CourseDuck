<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 选择专业</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">步骤 2/3：选择专业</span></h1>
          </div>
        </div>
        <div class="nav">
          <span class="chip" id="userChip">未登录</span>
          <a class="btn" href="./school.html">返回学院选择</a>
          <a class="btn" href="./login.html">退出/切换账号</a>
        </div>
      </header>

      <section class="panel centered">
          <h2>先确认你的专业</h2>
          <p class="hint">确认后将跳转到职业选择页，再进行课程推荐。</p>
          <p class="hint" id="smeScopeHint" style="display: none">
            当前版本仅支持 <strong>SME</strong> 课程推荐；其他学院数据将在后续更新。
          </p>

          <form id="majorForm" action="./career.html" method="get" novalidate>
            <div class="field">
              <label for="major">专业</label>
              <select id="major" name="majorId">
                <option value="">请选择专业</option>
                <option value="economics">经济学</option>
                <option value="fin">金融学</option>
                <option value="intl_business">国际商务</option>
                <option value="accounting">会计学</option>
                <option value="fe">金融工程</option>
                <option value="mkt_ib">市场营销</option>
                <option value="bdm">大数据管理与应用</option>
              </select>
            </div>
            <div class="row" style="margin-top:12px; justify-content:flex-end">
              <button class="btn primary confirm-btn" id="confirmMajorBtn" type="submit">确认</button>
            </div>
          </form>
      </section>
    </div>

    <script type="module">
      import { getMajors } from "./assets/api.js";
      import { $, setText, toast, readSession, readProfile, writeProfile } from "./assets/ui.js";

      const session = readSession();
      const userChip = $("#userChip");
      userChip.textContent = session?.user?.email ? `已登录：${session.user.email}` : "未登录";

      const majorSel = $("#major");
      const majorForm = $("#majorForm");
      const kpiMajor = $("#kpiMajor");
      const kpiStatus = $("#kpiStatus");
      const smeScopeHint = $("#smeScopeHint");

      const SCHOOL_IDS = ["SME", "SSE", "SDS", "SAI", "HSS", "MUS", "MED"];
      const qsSchool = new URLSearchParams(window.location.search).get("schoolId");
      if (qsSchool && SCHOOL_IDS.includes(qsSchool)) {
        writeProfile({ ...(readProfile() || {}), schoolId: qsSchool });
        history.replaceState({}, "", window.location.pathname || "./info.html");
      }
      let profile = readProfile() || { majorId: "", careerId: "" };
      if (!profile.schoolId || !SCHOOL_IDS.includes(profile.schoolId)) {
        window.location.replace("./school.html");
      }
      if (profile.schoolId && profile.schoolId !== "SME") {
        smeScopeHint.style.display = "block";
      }

      let allMajors = [];

      function syncUi() {
        const name = allMajors.find((x) => x.id === majorSel.value)?.name || "-";
        setText(kpiMajor, name);
        setText(kpiStatus, majorSel.value ? "已选择" : "待确认");
      }

      majorSel.addEventListener("change", () => {
        writeProfile({ ...(readProfile() || {}), majorId: majorSel.value, careerId: "" });
        syncUi();
      });

      (async function init() {
        const { items } = await getMajors();
        allMajors = Array.isArray(items) ? items : [];
        if (allMajors.length > 0) {
          majorSel.innerHTML =
            `<option value="">请选择专业</option>` +
            allMajors.map((m) => `<option value="${m.id}">${m.name}</option>`).join("");
          if (profile.majorId && allMajors.some((m) => m.id === profile.majorId)) {
            majorSel.value = profile.majorId;
          }
        }
        syncUi();
      })().catch((err) => toast({ title: "加载失败", message: String(err?.message || err) }));
    </script>
    <script>
      /* 与学院页一致：普通脚本负责提交校验 + 写入 profile，不选专业则提示并拦截跳转 */
      (function () {
        var form = document.getElementById("majorForm");
        var major = document.getElementById("major");
        if (!form || !major) return;
        function readProfile() {
          try {
            return JSON.parse(localStorage.getItem("courseduck.profile") || "{}");
          } catch (e) {
            return {};
          }
        }
        function writeProfile(obj) {
          localStorage.setItem("courseduck.profile", JSON.stringify(obj));
        }
        form.addEventListener("submit", function (e) {
          var v = (major.value || "").trim();
          if (!v) {
            e.preventDefault();
            window.alert("请先选择专业：请在下拉框中选择一项后，再点击「确认专业并选择职业」。");
            return;
          }
          var p = readProfile();
          p.majorId = v;
          p.careerId = "";
          writeProfile(p);
        });
      })();
    </script>
  </body>
</html>
