<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 推荐</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">推荐（技能树 + 课程）</span></h1>
          </div>
        </div>
        <div class="nav">
          <span class="chip" id="profileChip">未选择</span>
          <a class="btn" href="./career.html">返回职业选择</a>
          <a class="btn danger" href="./login.html">退出/切换账号</a>
        </div>
      </header>

      <div class="recommend-layout">
        <div class="recommend-left">
          <section class="panel">
            <h2>技能树展示</h2>
            <p class="hint">
              技能树用于解释“为什么推荐这些课”。后端可根据学生已修课程/测评结果计算 <span style="font-family:var(--mono)">have/gaps</span>。
              本页预留接口：<span style="font-family:var(--mono)">GET /api/skill-tree</span>、<span style="font-family:var(--mono)">POST /api/recommendations</span>
            </p>
            <div class="tree" id="tree"></div>
          </section>

          <section class="panel">
            <h2>专业课程库</h2>
            <p class="hint">勾选你已经上过的课程，系统会在推荐中标记“已修”。</p>
            <div class="list" id="courseList" style="margin-top:10px"></div>
          </section>
        </div>

        <aside class="panel recommend-right">
          <h2>课程推荐</h2>
          <p class="hint">推荐结果与技能树同排展示，点击课程详情跳转到详情页查看。</p>
          <div class="row" style="justify-content:space-between; margin-bottom:10px">
            <span class="chip" id="reqMeta">requestId: -</span>
            <button class="btn primary" id="regenBtn" type="button">重新生成</button>
          </div>
          <div class="list" id="recoList"></div>
        </aside>
      </div>

      <div class="footer">建议：后端接入后，把推荐结果落库，支持“收藏/反馈/不喜欢/原因”闭环优化</div>
    </div>

        if (!p.careerId && q.get("careerId")) p.careerId = q.get("careerId");
        return p || {};
      })();
      if (!profile.majorId || !profile.careerId) {
        window.location.href = profile.majorId ? "./career.html" : "./info.html";
      }

      const profileChip = $("#profileChip");

        career_fintech_algo: { skills:["机器学习","数据分析","金融算法","大数据处理","模型部署"], courses:["DDA3020 Machine Learning","ACT4311 Data Mining for Accounting Analytics","FIN3210 Fintech Theory and Practice","FMA4200 Financial Data Analysis","FIN3090 AI Applications in Finance","STA4003 Time Series"] },
        career_bi_analyst: { skills:["数据清洗","统计建模","可视化","商业洞察","报告输出"], courses:["DMS3003 Data Analytics and Decision Making","ACT4321 Accounting Database and Data Visualization","MKT3310 Marketing Analytics","ACT4311 Data Mining for Accounting Analytics","STA3010 Regression Analysis","STA3020 Statistical Inference"] },

        career_cross_border_business: { skills:["国际贸易","跨境运营","海关合规","海外市场拓展","供应链管理"], courses:["ECO3610 International Trade","MGT3250 International Business","MKT3050 Global Marketing","DMS2030 Operations Management","ECO3630 International Finance","MGT4250 Cross-Cultural Communication and Negotiation"] },

        career_internet_marketing_ops: { skills:["用户增长","内容策划","活动运营","渠道投放","数据复盘"], courses:["MKT2010 Marketing Management","MKT3320 Digital Consumer Analytics","MKT3020 Consumer Behavior","MKT3310 Marketing Analytics","MKT3080 Strategic Media Planning"] },

      const data = CAREER_PROFILES[profile.careerId] || { skills: [], courses: [] };
      const COURSE_DETAILS_RAW = [
        "FIN2010|财务管理基础|投融资、资本成本、现金流",

        "FIN3210|金融科技|大数据、区块链、AI在金融中应用",
        "FIN3340|风投/私募股权|初创估值、退出机制",

        "MAT3280|概率论|测度、期望、大数定律、中心极限定理",
        "STA2001|概率统计I|分布、估计、检验、回归",
        "STA2002|概率统计II|分布、估计、检验、回归",

        "MIS3011|高级商业AI|大模型、提示工程、AI项目全流程",
        "MKT3310|营销分析|聚类、回归、分类、客户价值",
        "MKT3320|数字消费者分析|RFM、逻辑回归、推荐系统、文本挖掘",
        "MKT3060|量化营销|A/B测试、回归、DID、因果推断",
        "MGT2020|管理学原理|计划、组织、领导、控制",
        "MGT3250|国际商务|全球化、进入模式、跨国公司、全球-本地平衡",
        "MGT4250|跨文化沟通与谈判|跨文化沟通与谈判",
        "MKT2010|营销管理|STP、4P、品牌、渠道、推广",
        "MKT3020|消费者行为|感知、学习、态度、群体、文化",
        "MKT3030|整合营销传播|公关、数字媒体、内容策略",
        "MKT4110|战略品牌管理|品牌资产、定位、延伸",
        "MKT4120|营销调研|问卷、抽样、数据分析、报告",
      ];
      const COURSE_DETAILS = COURSE_DETAILS_RAW.reduce((acc, line) => {
        const [code, intro, outline] = line.split("|");
        acc[code] = { intro, outline };
        return acc;
      }, {});
      const treeEl = $("#tree");
      const courseListEl = $("#courseList");
      const recoList = $("#recoList");
      const reqMeta = $("#reqMeta");
      const regenBtn = $("#regenBtn");
      const takenKey = `courseduck.taken.${profile.majorId || "na"}.${profile.careerId || "na"}`;
      const takenSet = (() => {
        try {
          const arr = JSON.parse(localStorage.getItem(takenKey) || "[]");
          return new Set(Array.isArray(arr) ? arr : []);
        } catch {
          return new Set();
        }
      })();

      function nodeHtml(name, required) {
        const half = Math.max(1, Math.floor(required.length / 2));
        const have = required.slice(0, half).map((s) => `<span class="pill have">${s}</span>`).join("");
        const gaps = required.slice(half).map((s) => `<span class="pill gap">${s}</span>`).join("");
        return `<div class="node"><div class="head"><div style="font-weight:800; font-size:13px">${name}</div><span class="badge warn">存在缺口</span></div><div class="skills">${have}${gaps}</div></div>`;
      }

      function chunks(arr, size) {
        const out = [];
        for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
        return out;
      }

      function parseCourse(text) {
        const sp = text.indexOf(" ");
        const code = sp > 0 ? text.slice(0, sp) : text;
        return { id: code, code, title: text, level: "进阶", durationHours: 16, tags: [code.slice(0, 3), "SME"] };
      }

      const allCourses = (data.courses || []).map(parseCourse);

      function courseItemHtml(c) {
        const tags = (c.tags || []).map((t) => `<span class="pill have">${t}</span>`).join("");
        const checked = takenSet.has(c.id) ? "checked" : "";
        return `<div class="item"><div class="t"><h3>${c.title}</h3><span class="badge warn">${c.level}</span></div><div class="meta"><div>来源：SME Course Catalog · 时长：${c.durationHours} 小时</div><div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:8px">${tags}</div><div class="row" style="margin-top:10px;justify-content:space-between"><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" data-course-id="${c.id}" ${checked} /> 已上过这门课</label><button class="btn" type="button" data-detail-code="${c.code}">课程详情</button></div></div></div>`;
      }

      function recoHtml(c, i) {
        const pct = 95 - i * 2;
        const takenBadge = takenSet.has(c.id) ? `<span class="badge">已修</span>` : "";
        return `<div class="item"><div class="t"><h3>${c.title}</h3><div class="row"><span class="badge ok">匹配度 ${pct}%</span>${takenBadge}</div></div><div class="meta"><button class="btn" type="button" data-detail-code="${c.code}">课程详情</button></div></div>`;
      }

      function renderTree() {
        const s = data.skills || [];
        if (s.length === 0) {
          treeEl.innerHTML = `<div class="item"><div class="meta">暂无技能树数据</div></div>`;
          return;
        }
        const parts = chunks(s, Math.max(2, Math.ceil(s.length / 3)));
        treeEl.innerHTML = parts.map((p, i) => nodeHtml(`核心技能组 ${i + 1}`, p)).join("");
      }

      function renderCourses() {
        courseListEl.innerHTML = allCourses.length ? allCourses.map(courseItemHtml).join("") : `<div class="item"><div class="meta">没有找到课程</div></div>`;
      }

      function renderReco() {
        reqMeta.textContent = `requestId: local_${Date.now()}`;
        recoList.innerHTML = allCourses.slice(0, 8).map(recoHtml).join("") || `<div class="item"><div class="meta">暂无推荐</div></div>`;
      }

      courseListEl.addEventListener("change", (e) => {
        const el = e.target.closest("input[type='checkbox'][data-course-id]");
        if (!el) return;
        const id = el.getAttribute("data-course-id");
        if (el.checked) takenSet.add(id); else takenSet.delete(id);
        localStorage.setItem(takenKey, JSON.stringify(Array.from(takenSet)));
        renderReco();
      });
      document.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-detail-code]");
        if (!btn) return;
        localStorage.setItem("courseduck.courseDetails", JSON.stringify(COURSE_DETAILS));
        const code = btn.getAttribute("data-detail-code");
        window.location.href = `./course-detail.html?code=${encodeURIComponent(code)}`;
      });
      regenBtn.addEventListener("click", () => renderReco());

      renderTree();
      renderCourses();
      renderReco();
    </script>
  </body>
</html>
