<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourseDuck - 选择职业</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <img class="logo-img" src="./assets/logo.png" alt="CourseDuck Logo" />
          <div>
            <h1>CourseDuck <span class="sub">步骤 3/3：选择职业</span></h1>
          </div>
        </div>
        <div class="nav">
          <a class="btn" href="./school.html">返回学院选择</a>
          <a class="btn" href="./info.html">返回专业选择</a>
          <a class="btn danger" href="./login.html">退出/切换账号</a>
        </div>
      </header>

      <section class="panel centered">
          <h2>确认目标职业</h2>
          <p class="hint">先选择职业类别，再选择该类别下的具体专业/岗位方向。</p>
          <div class="field">
            <label>已选专业</label>
            <div class="chip" id="majorNameChip">-</div>
          </div>
          <div class="field">
            <label for="careerCategory">职业类别</label>
            <select id="careerCategory">
              <option value="">请选择职业类别</option>
            </select>
          </div>
          <div class="field">
            <label for="career">具体专业/岗位</label>
            <select id="career">
              <option value="">请先选择职业类别</option>
            </select>
          </div>
          <form id="careerForm" action="./recommend.html" method="get">
            <input type="hidden" name="majorId" id="majorIdHidden" value="" />
            <input type="hidden" name="careerId" id="careerIdHidden" value="" />
            <div class="row" style="margin-top:12px; justify-content:flex-end">
              <button class="btn primary confirm-btn" type="submit" id="confirmCareerBtn">确认</button>
            </div>
          </form>
          <div class="item" style="margin-top:12px;">
          <h2>提示</h2>
          <p class="hint">确认职业后将直接跳转到推荐页，展示课程搜索、技能树和推荐结果。</p>
          </div>
      </section>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      const setText = (el, text) => { if (el) el.textContent = text ?? ""; };
      function toast(msg) { window.alert(msg); }
      function readProfile() {
        try { return JSON.parse(localStorage.getItem("courseduck.profile") || "{}"); } catch { return {}; }
      }
      function writeProfile(v) {
        localStorage.setItem("courseduck.profile", JSON.stringify(v));
      }

      const MAJOR_NAMES = {
        economics: "经济学",
        fin: "金融学",
        intl_business: "国际商务",
        accounting: "专业会计学",
        fe: "金融工程",
        mkt_ib: "市场营销与国际商务",
        bdm: "大数据管理与应用",
      };
      const SCHOOL_IDS = ["SME", "SSE", "SDS", "SAI", "HSS", "MUS", "MED"];
      const profile = readProfile() || { majorId: "", careerId: "" };
      if (!profile.schoolId || !SCHOOL_IDS.includes(profile.schoolId)) {
        window.location.href = "./school.html";
      }
      const queryMajorId = new URLSearchParams(window.location.search).get("majorId") || "";
      const majorId = queryMajorId || profile.majorId || "";
      if (!majorId) {
        window.location.href = "./info.html";
      }

      const majorNameChip = $("#majorNameChip");
      const careerCategorySel = $("#careerCategory");
      const careerSel = $("#career");
      const careerForm = $("#careerForm");
      const majorIdHidden = $("#majorIdHidden");
      const careerIdHidden = $("#careerIdHidden");
      const CAREER_CATEGORIES = [
        { id: "product", name: "产品" },
        { id: "operations", name: "运营" },
        { id: "design", name: "设计" },
        { id: "hr_admin", name: "人力/行政" },
        { id: "finance_audit_tax", name: "财务/审计/税务" },
        { id: "consulting", name: "咨询" },
        { id: "sales", name: "销售" },
        { id: "supply_chain_logistics", name: "供应链/物流" },
        { id: "procurement_trade", name: "采购/贸易" },
        { id: "marketing_pr_ad", name: "市场/公关/广告" },
        { id: "finance", name: "金融" },
      ];
      const CAREER_OPTIONS = [
        { id: "career_product_manager", name: "互联网产品经理", categoryId: "product" },
        { id: "career_game_planner", name: "游戏策划/制作", categoryId: "product" },
        { id: "career_hardware_product_manager", name: "硬件产品经理", categoryId: "product" },
        { id: "career_cosmetics_product_manager", name: "化妆品产品经理", categoryId: "product" },
        { id: "career_fin_product_manager", name: "金融产品经理", categoryId: "product" },
        { id: "career_content_ops", name: "内容运营", categoryId: "operations" },
        { id: "career_new_media_ops", name: "新媒体运营", categoryId: "operations" },
        { id: "career_product_ops", name: "产品运营", categoryId: "operations" },
        { id: "career_seo_sem", name: "SEO/SEM", categoryId: "operations" },
        { id: "career_domestic_ecom_ops", name: "国内电商处理", categoryId: "operations" },
        { id: "career_crossborder_ecom_ops", name: "跨境电商运营", categoryId: "operations" },
        { id: "career_business_ops", name: "业务运营", categoryId: "operations" },
        { id: "career_category_ops", name: "品类运营", categoryId: "operations" },
        { id: "career_offline_ops", name: "线下运营", categoryId: "operations" },
        { id: "career_user_research", name: "用户研究", categoryId: "design" },
        { id: "career_hr", name: "人力资源", categoryId: "hr_admin" },
        { id: "career_admin", name: "行政", categoryId: "hr_admin" },
        { id: "career_accounting", name: "会计", categoryId: "finance_audit_tax" },
        { id: "career_risk_control", name: "风控", categoryId: "finance_audit_tax" },
        { id: "career_internet_finance", name: "互联网金融", categoryId: "finance_audit_tax" },
        { id: "career_cashier", name: "出纳", categoryId: "finance_audit_tax" },
        { id: "career_financial_consultant", name: "财务顾问", categoryId: "finance_audit_tax" },
        { id: "career_tax", name: "税务", categoryId: "finance_audit_tax" },
        { id: "career_audit", name: "审计", categoryId: "finance_audit_tax" },
        { id: "career_fin_bp", name: "财务分析/财务BP", categoryId: "finance_audit_tax" },
        { id: "career_consulting_research", name: "咨询/调研", categoryId: "consulting" },
        { id: "career_sales", name: "销售", categoryId: "sales" },
        { id: "career_real_estate_sales", name: "房地产销售/招商", categoryId: "sales" },
        { id: "career_software_sales", name: "软件销售", categoryId: "sales" },
        { id: "career_financial_sales", name: "金融销售", categoryId: "sales" },
        { id: "career_auto_sales", name: "汽车销售", categoryId: "sales" },
        { id: "career_expo_sales", name: "广告/会展销售", categoryId: "sales" },
        { id: "career_sales_management", name: "销售管理", categoryId: "sales" },
        { id: "career_service_sales", name: "服务业销售", categoryId: "sales" },
        { id: "career_foreign_trade_sales", name: "外贸销售", categoryId: "sales" },
        { id: "career_plan_production_plan", name: "计划", categoryId: "supply_chain_logistics" },
        { id: "career_procurement", name: "采购", categoryId: "supply_chain_logistics" },
        { id: "career_warehouse", name: "仓储", categoryId: "supply_chain_logistics" },
        { id: "career_logistics", name: "物流", categoryId: "supply_chain_logistics" },
        { id: "career_supply_chain_ops", name: "供应链", categoryId: "supply_chain_logistics" },
        { id: "career_procurement_trade_procurement", name: "采购", categoryId: "procurement_trade" },
        { id: "career_import_export_trade", name: "进出口贸易", categoryId: "procurement_trade" },
        { id: "career_procurement_buyer_trade", name: "买手", categoryId: "procurement_trade" },
        { id: "career_advertising", name: "广告", categoryId: "marketing_pr_ad" },
        { id: "career_marketing", name: "市场/营销", categoryId: "marketing_pr_ad" },
        { id: "career_business_data_analysis", name: "商业数据分析", categoryId: "marketing_pr_ad" },
        { id: "career_pr_media", name: "公关媒介", categoryId: "marketing_pr_ad" },
        { id: "career_finance_risk_compliance", name: "风控合规清算", categoryId: "finance" },
        { id: "career_financing", name: "投融资", categoryId: "finance" },
        { id: "career_asset_evaluation", name: "资产评估", categoryId: "finance" },
        { id: "career_securities_fund_futures", name: "证券/基金/期货", categoryId: "finance" },
        { id: "career_credit_evaluation", name: "资信评估", categoryId: "finance" },
        { id: "career_banking", name: "银行", categoryId: "finance" },
        { id: "career_collection_agent", name: "催收员", categoryId: "finance" },
        { id: "career_actuary", name: "保险精算师", categoryId: "finance" },
        { id: "career_claims_adjuster", name: "保险理赔", categoryId: "finance" },
      ];

      setText(majorNameChip, MAJOR_NAMES[majorId] || majorId || "-");
      majorIdHidden.value = majorId;

      const allowedCareers = CAREER_OPTIONS;
      const allowedCategories = CAREER_CATEGORIES;

      careerCategorySel.innerHTML =
        `<option value="">请选择职业类别</option>` +
        allowedCategories.map((category) => `<option value="${category.id}">${category.name}</option>`).join("");

      function renderCareersByCategory(categoryId) {
        const matchedCategory = allowedCategories.find((category) => category.id === categoryId);
        if (!matchedCategory) {
          careerSel.innerHTML = `<option value="">请先选择职业类别</option>`;
          careerSel.value = "";
          careerIdHidden.value = "";
          return;
        }
        const careersInCategory = allowedCareers.filter((career) => career.categoryId === categoryId);
        careerSel.innerHTML =
          `<option value="">请选择具体专业/岗位</option>` +
          careersInCategory.map((career) => `<option value="${career.id}">${career.name}</option>`).join("");
      }

      const initialCareer = allowedCareers.find((career) => career.id === profile.careerId);
      if (initialCareer) {
        careerCategorySel.value = initialCareer.categoryId;
        renderCareersByCategory(initialCareer.categoryId);
        careerSel.value = initialCareer.id;
      } else {
        renderCareersByCategory("");
      }
      careerIdHidden.value = careerSel.value || "";

      careerCategorySel.addEventListener("change", () => {
        renderCareersByCategory(careerCategorySel.value);
      });

      careerSel.addEventListener("change", () => {
        careerIdHidden.value = careerSel.value || "";
      });

      careerForm.addEventListener("submit", (e) => {
        if (!careerCategorySel.value) {
          e.preventDefault();
          toast("请先选择职业类别。");
          return;
        }
        if (!careerSel.value) {
          e.preventDefault();
          toast("请选择具体专业/岗位后再进入课程推荐页。");
          return;
        }
        writeProfile({
          ...(readProfile() || {}),
          majorId,
          careerId: careerSel.value,
          careerCategoryId: careerCategorySel.value,
        });
        careerIdHidden.value = careerSel.value;
      });
    </script>
  </body>
</html>
